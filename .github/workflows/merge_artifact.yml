# .github/workflows/push-artifact.yml
name: Push Artifact

on:
  workflow_dispatch:
    inputs:
      run:
        description: 'Run-id number associated with the artifact'
        required: true
      git_email:
        description: 'Email associated with your GitHub accout'
        required: true
      git_user:
        description: 'Username associated with your GitHub accout'
        required: true

jobs:
  push_artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GIT_TOKEN }}
          run-id: ${{ github.event.inputs.run }}

      - name: Commit and push the artifact
        run: |
          # Assuming the artifact is named 'new-file.txt'
          git config --local user.email "your_email@example.com"
          git config --local user.name "Your Name"
          git mv parsed_issue/parsed_issue.yaml appliances/service/.
          git add appliances/service/parsed_issue.yaml
          git commit -m "Add YAML generated by run #${{ github.event.inputs.run }}"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}
