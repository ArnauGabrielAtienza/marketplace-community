# .github/workflows/push-artifact.yml
name: Push Artifact

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number associated with the artifact'
        required: true
      git_email:
        description: 'Email associated with your GitHub accout'
        required: true
      git_user:
        description: 'Username associated with your GitHub accout'
        required: true

jobs:
  push_artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GIT_TOKEN }}
          run-id: ${{ github.event.inputs.issue_number }}

      - run: ls -la

      - run: ls -la parsed_issue
