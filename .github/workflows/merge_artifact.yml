# .github/workflows/push-artifact.yml
name: Push Artifact

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number associated with the artifact'
        required: true
      git_email:
        description: 'Email associated with your GitHub accout'
        required: true
      git_user:
        description: 'Username associated with your GitHub accout'
        required: true

jobs:
  push_artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: parsed_issue.yaml

      - name: Commit and push the artifact
        run: |
          # Assuming the artifact is named 'new-file.txt'
          git config --local user.email "${{ github.event.inputs.git_email }}"
          git config --local user.name "${{ github.event.inputs.git_user }}"
          mv parsed_issue.yaml appliances/service/.
          git add appliances/service/parsed_issue.yaml
          git commit -m "Add yaml artifact generated by issue #${{ github.event.inputs.issue_number }}"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
