name: New Extension Submission Form
description: A form to submit a new extension to be reviewed and entered in the catalog
labels: ["received"]
body:
- type: markdown
  attributes:
    value: |
      Thank you for submitting your Extension to the Catalog
- type: input
  id: name
  attributes:
    label: Publisher Name
    description: The publisher of the extension. This can be you or your company name.
  validations:
    required: true
- type: input
  id: version
  attributes:
    label: Version
    description: The version of your extension
  validations:
    required: true
- type: textarea
  id: description
  attributes:
    label: Long Description
    description: A long description of your extension, supports markdown
  validations:
    required: true
- type: input
  id: short_description
  attributes:
    label: Short Description
    description: A short description that will show on the card in the catalog
  validations:
    required: false
- type: dropdown
  id: type
  attributes:
    label: Extension Type
    description: The type of the extension (Northbound, Southbound, East-Westbound)
    options:
      - Northbound
      - Southbound
      - East-Westbound
    default: 0
  validations:
    required: true
- type: dropdown
  id: southbound_type
  attributes:
    label: Southbound Extension Type
    description: Only required if Type is Southbound. Denotes the type of Southbound Extension.
    options:
      - Virtualization
      - Storage
      - Monitoring
      - Networking
      - Authentication
      - Market
      - IPAM
- type: dropdown
  id: versions
  attributes:
    label: OpenNebula Versions
    description: The OpenNebula versions you have tested this extension for and should be compatible with.
    multiple: true
    options:
      - 6.4
      - 6.8
      - 6.10
      - 7.0
- type: input
  id: tags
  attributes:
    label: Tags
    description: The tags which describe this extension to make it easier to find in the catalog when searching. Comma separated list
- type: input
  id: documentation_url
  attributes:
    label: Documentation URL
    description: A URL to the documentation which covers the usage of your extension
- type: input
  id: source_code_url
  attributes:
    label: Source Code URL
    description: A URL to the source code of your extension
- type: input
  id: extra_information
  attributes:
    label: Extra Information for OpenNebula
    description: Use this to provide us with any extra context you would like to provide to us

